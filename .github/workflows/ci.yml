name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill_file:
          - SKILL.md
          - codex/SKILL.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill file exists
        run: test -f "${{ matrix.skill_file }}"

      - name: Validate required frontmatter fields
        run: |
          head -n 30 "${{ matrix.skill_file }}" > /tmp/frontmatter.txt
          grep -q '^---$' /tmp/frontmatter.txt
          grep -q '^name:' /tmp/frontmatter.txt
          grep -q '^description:' /tmp/frontmatter.txt

      - name: Validate safety guardrails mention
        run: |
          grep -qi 'Do not invent citations\|Do not invent' "${{ matrix.skill_file }}"
          grep -qi 'legal\|financial' "${{ matrix.skill_file }}"
